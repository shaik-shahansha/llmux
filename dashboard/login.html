<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLMux — Login</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --accent: #58a6ff; --accent-hover: #79c0ff;
    --success: #3fb950; --error: #f85149;
    --text: #e6edf3; --text-muted: #8b949e;
    --input-bg: #0d1117; --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  .logo { display: flex; align-items: center; gap: .75rem; margin-bottom: .5rem; }
  .logo-icon { width: 40px; height: 40px; background: var(--accent); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 700; color: #000; }
  .logo h1 { font-size: 1.4rem; font-weight: 600; }
  .subtitle { color: var(--text-muted); font-size: .875rem; margin-bottom: 2rem; }
  .form-group { margin-bottom: 1.25rem; }
  label { display: block; font-size: .875rem; font-weight: 500; margin-bottom: .5rem; color: var(--text-muted); }
  input {
    width: 100%; padding: .65rem .875rem; background: var(--input-bg); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: .9rem; outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: var(--accent); }
  .btn {
    width: 100%; padding: .75rem; background: var(--accent); color: #000; border: none;
    border-radius: var(--radius); font-size: .95rem; font-weight: 600; cursor: pointer;
    transition: background .15s, opacity .15s;
  }
  .btn:hover:not(:disabled) { background: var(--accent-hover); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .alert { padding: .75rem 1rem; border-radius: var(--radius); font-size: .875rem; margin-bottom: 1rem; display: none; }
  .alert-error { background: rgba(248,81,73,.1); border: 1px solid var(--error); color: var(--error); }
  .spin { animation: spin .8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .attempts { font-size: .8rem; color: var(--text-muted); text-align: center; margin-top: .75rem; display: none; }
  .shake { animation: shake .3s; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
  }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">
    <div class="logo-icon">L</div>
    <h1>LLMux</h1>
  </div>
  <p class="subtitle">Admin Dashboard Login</p>

  <div class="alert alert-error" id="errorMsg"></div>

  <form id="loginForm">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" autocomplete="username" placeholder="admin" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn" id="submitBtn">Sign In</button>
  </form>
  <div class="attempts" id="attemptsNote"></div>
</div>

<script>
  // Auto-redirect if already logged in
  (async () => {
    const token = localStorage.getItem('llmux_token');
    if (token) {
      try {
        const res = await fetch('/api/admin/me', {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (res.ok) { window.location.href = '/dashboard'; }
      } catch { /* not logged in */ }
    }
  })();

  let failCount = 0;

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('errorMsg');
    err.style.display = 'none';
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin">⟳</span> Signing in...';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
        credentials: 'include',
      });
      const data = await res.json();

      if (!res.ok) {
        failCount++;
        const card = document.getElementById('card');
        card.classList.remove('shake');
        void card.offsetWidth; // reflow for animation restart
        card.classList.add('shake');

        err.textContent = data.error?.message ?? 'Login failed.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
        document.getElementById('password').value = '';

        if (failCount >= 3) {
          const note = document.getElementById('attemptsNote');
          note.textContent = `${failCount} failed attempt${failCount > 1 ? 's' : ''}. Account locks after 10.`;
          note.style.display = 'block';
        }
        return;
      }

      // Store JWT for API calls (cookie also set by server for browser navigation)
      if (data.token) localStorage.setItem('llmux_token', data.token);

      const returnTo = new URLSearchParams(window.location.search).get('returnTo') ?? '/dashboard';
      window.location.href = returnTo;
    } catch {
      err.textContent = 'Network error — is the server running?';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
