# ============================================================
#  LLMux -- Provider Configuration
#  Multiplex every LLM. Never hit a limit.
#  All ${ENV_VAR} references are interpolated from .env
#
#  Multi-key rotation: use api_keys array to provide multiple
#  API keys for a provider. Alloy round-robins and auto-rotates
#  on 429 rate-limit errors.
#
#  Example:
#    api_keys:
#      - ${GROQ_API_KEY_1}
#      - ${GROQ_API_KEY_2}
#      - ${GROQ_API_KEY_3}
# ============================================================

router:
  default_strategy: priority        # priority | round-robin | least-busy | latency-based | random-weighted
  fallback_enabled: true
  max_fallback_attempts: 5

gateway:
  max_request_size_mb: 10
  request_timeout_ms: 60000
  enable_request_logging: true

providers:

  # -- Tier 1 Text -- Groq ----------------------------------------------------
  # Updated April 2026: Added GPT-OSS 120B/20B (OpenAI open-weight on Groq)
  - id: groq-llama3-70b
    name: Groq
    modality: text
    tier: 1
    enabled: true
    requires_auth: true
    api_key: ${GROQ_API_KEY}
    base_url: https://api.groq.com/openai/v1
    adapter: openai
    models:
      - id: openai/gpt-oss-120b
        alias: gpt-oss-120b
        context_window: 131072
        max_output_tokens: 65536
      - id: openai/gpt-oss-20b
        alias: gpt-oss-20b
        context_window: 131072
        max_output_tokens: 65536
      - id: llama-3.3-70b-versatile
        alias: llama-3.3-70b
        context_window: 131072
        max_output_tokens: 32768
      - id: llama-3.1-8b-instant
        alias: llama3-8b
        context_window: 131072
      - id: meta-llama/llama-4-scout-17b-16e-instruct
        alias: llama-4-scout
        context_window: 131072
      - id: qwen/qwen3-32b
        alias: qwen3-32b
        context_window: 131072
    limits:
      rpm: 30
      rpd: 14400
      tpm: 6000
      tpd: 500000
    health_check:
      enabled: true
      interval_seconds: 60
    concurrency: 5
    timeout: 30000
    max_retries: 2

