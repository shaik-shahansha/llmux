[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[services]]
name = "llmux"

[services.variables]
PORT = "3000"
NODE_ENV = "production"
LOG_LEVEL = "info"
PROVIDERS_CONFIG_PATH = "config/providers.yaml"
